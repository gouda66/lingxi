server:
  port: 8081

spring:
  application:
    name: isi
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/isi_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: Zpg1314521@
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  # SQL 初始化配置
  sql:
    init:
      mode: always
      data-locations: classpath:db/menu_init.sql
      continue-on-error: false
      encoding: UTF-8
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    # Redis 配置
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# 验证码配置
captcha:
  length: 4
  expire-seconds: 300
  enabled: true
  chars: "23456789ABCDEFGHJKLMNPQRSTUVWXYZ"

# 日志配置
logging:
  level:
    com.lingxi.isi: debug
    org.springframework.web: info

# AI 配置（可选）
ai:
  enabled: false
  api-key: ${OPENAI_API_KEY:your-api-key}
  base-url: https://api.openai.com/v1
