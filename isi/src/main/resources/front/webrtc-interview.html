<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试间 - WebRTC 视频通话</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        video {
            width: 100%;
            height: auto;
            background: #000;
            border-radius: 8px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }
        .btn-start { background: #4CAF50; color: white; }
        .btn-end { background: #f44336; color: white; }
        .btn-mute { background: #2196F3; color: white; }
        .status {
            padding: 10px;
            background: #f0f0f0;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>面试间视频通话</h1>
    
    <div class="status" id="status">状态：未连接</div>
    
    <div class="controls">
        <button class="btn-start" onclick="startCall()">开始通话</button>
        <button class="btn-mute" onclick="toggleMute()">静音/取消静音</button>
        <button class="btn-end" onclick="endCall()">结束通话</button>
    </div>
    
    <div class="video-container">
        <div>
            <h3>我的视频</h3>
            <video id="localVideo" autoplay muted></video>
        </div>
        <div>
            <h3>对方视频</h3>
            <video id="remoteVideo" autoplay></video>
        </div>
    </div>

    <script>
        // 房间信息
        const ROOM_ID = 'ROOM-20260309120000-ABC123';
        const USER_ID = 3; // 当前用户 ID
        const USERNAME = '李小明';
        
        // WebRTC 变量
        let localStream;
        let peerConnection;
        let websocket;
        
        // ICE 服务器配置
        const iceServers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        
        // 更新状态
        function updateStatus(msg) {
            document.getElementById('status').innerText = '状态：' + msg;
        }
        
        // 获取本地媒体流
        async function getLocalMedia() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;
                updateStatus('已获取本地媒体流');
                return true;
            } catch (err) {
                console.error('获取媒体流失败:', err);
                updateStatus('获取媒体流失败：' + err.message);
                return false;
            }
        }
        
        // 创建对等连接
        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(iceServers);
            
            // 添加本地流到连接
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
            // 监听远程流
            peerConnection.ontrack = (event) => {
                console.log('收到远程流');
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };
            
            // ICE candidate 处理
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('发送 ICE candidate');
                    sendIceCandidate(event.candidate);
                }
            };
            
            updateStatus('对等连接已创建');
        }
        
        // 创建 Offer（发起方）
        async function createOffer() {
            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                // 通过 WebSocket 发送给 HR
                sendMessage({
                    type: 'offer',
                    sdp: offer,
                    roomId: ROOM_ID,
                    userId: USER_ID
                });
                
                updateStatus('Offer 已创建并发送');
            } catch (err) {
                console.error('创建 Offer 失败:', err);
                updateStatus('创建 Offer 失败：' + err.message);
            }
        }
        
        // 创建 Answer（接收方）
        async function createAnswer(offerSdp) {
            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offerSdp));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                // 发送 Answer
                sendMessage({
                    type: 'answer',
                    sdp: answer,
                    roomId: ROOM_ID
                });
                
                updateStatus('Answer 已创建并发送');
            } catch (err) {
                console.error('创建 Answer 失败:', err);
                updateStatus('创建 Answer 失败：' + err.message);
            }
        }
        
        // 发送 ICE Candidate
        async function sendIceCandidate(candidate) {
            sendMessage({
                type: 'ice-candidate',
                candidate: candidate,
                roomId: ROOM_ID,
                fromUserId: USER_ID
            });
        }
        
        // 处理收到的消息
        async function handleMessage(message) {
            console.log('收到消息:', message);
            
            switch (message.type) {
                case 'offer':
                    await createAnswer(message.sdp);
                    break;
                    
                case 'answer':
                    await peerConnection.setRemoteDescription(
                        new RTCSessionDescription(message.sdp)
                    );
                    break;
                    
                case 'ice-candidate':
                    await peerConnection.addIceCandidate(
                        new RTCIceCandidate(message.candidate)
                    );
                    break;
            }
        }
        
        // WebSocket 通信
        function connectWebSocket() {
            // 连接到 WebSocket 服务器
            websocket = new WebSocket('ws://localhost:8081/ws-interview');
            
            websocket.onopen = () => {
                console.log('WebSocket 已连接');
                updateStatus('WebSocket 已连接');
                
                // 加入房间
                sendMessage({
                    type: 'join-room',
                    roomId: ROOM_ID,
                    userId: USER_ID,
                    username: USERNAME
                });
            };
            
            websocket.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleMessage(message);
            };
            
            websocket.onerror = (err) => {
                console.error('WebSocket 错误:', err);
                updateStatus('WebSocket 错误');
            };
            
            websocket.onclose = () => {
                console.log('WebSocket 已关闭');
                updateStatus('WebSocket 已关闭');
            };
        }
        
        // 发送 WebSocket 消息
        function sendMessage(message) {
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify(message));
            }
        }
        
        // 开始通话
        async function startCall() {
            updateStatus('正在启动...');
            
            // 1. 获取本地媒体流
            const hasMedia = await getLocalMedia();
            if (!hasMedia) return;
            
            // 2. 连接 WebSocket
            connectWebSocket();
            
            // 3. 创建对等连接
            createPeerConnection();
            
            // 4. 创建并发送 Offer（如果是发起方）
            setTimeout(() => {
                createOffer();
            }, 1000);
        }
        
        // 结束通话
        function endCall() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            if (websocket) {
                sendMessage({
                    type: 'leave-room',
                    roomId: ROOM_ID,
                    userId: USER_ID
                });
                websocket.close();
            }
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            updateStatus('通话已结束');
        }
        
        // 切换静音
        function toggleMute() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    updateStatus(audioTrack.enabled ? '已取消静音' : '已静音');
                }
            }
        }
        
        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            endCall();
        });
    </script>
</body>
</html>
