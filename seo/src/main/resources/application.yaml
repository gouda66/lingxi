spring:
  application:
    name: seo
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/seo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000&queryTimeout=30000
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 20000
      validation-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 2
      leak-detection-threshold: 30000
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 5
          min-idle: 2
          max-wait: 10000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-statement-timeout: 30
    default-fetch-size: 100
    lazy-loading-enabled: false
    aggressive-lazy-loading: false
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0


server:
  port: 8082

nginx:
  ssh:
    host: ${NGINX_SSH_HOST:localhost}
    port: ${NGINX_SSH_PORT:22}
    username: ${NGINX_SSH_USERNAME:root}
    password: ${NGINX_SSH_PASSWORD}
  config:
    path: /etc/nginx/conf.d/seo-web.conf

