# ==========================================

# ------------------------------------------
# 通用规则 (GENERAL)
# ------------------------------------------

# 移除 URL 末尾的斜杠
rewrite ^/(.*?)/$ /$1 permanent;

# 强制 HTTPS（如果需要）
# if ($scheme = http) {
#     return 301 https://$server_name$request_uri;
# }

# ------------------------------------------
# SEO 优化规则 (SEO)
# ------------------------------------------

# 旧博客文章永久重定向到新的文章路径
rewrite ^/blog/(.*)$ /articles/$1 permanent;

# 产品页面伪静态化
rewrite ^/product/([0-9]+)\.html$ /api/product/detail?id=$1 last;

# 分类页面美化
rewrite ^/category/([a-z0-9-]+)/?$ /products?category=$1 last;

# 标签页面
rewrite ^/tag/([a-z0-9-]+)/?$ /posts?tag=$1 last;

# 日期归档
rewrite ^/archive/([0-9]{4})/([0-9]{2})/?$ /posts?year=$1&month=$2 last;

# ------------------------------------------
# API 网关规则 (API)
# ------------------------------------------

# 统一 API 前缀
rewrite ^/api/v1/(.*)$ /api/$1 last;

# 用户中心 API
rewrite ^/user/([0-9]+)/profile$ /api/user/profile?id=$1 last;

# 订单查询
rewrite ^/order/([A-Z0-9]+)/detail$ /api/order/detail?orderNo=$1 last;

# ------------------------------------------
# 多语言支持
# ------------------------------------------

# 英文版本
rewrite ^/en/(.*)$ /$1?lang=en last;

# 日文版本
rewrite ^/ja/(.*)$ /$1?lang=ja last;

# ------------------------------------------
# 特殊处理
# ------------------------------------------

# 禁止访问隐藏文件和目录
location ~ /\. {
    deny all;
}

# 禁止访问备份文件
location ~* \.(bak|swp|tmp)$ {
    deny all;
}
